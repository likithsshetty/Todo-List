services:
  mongo:
    image: mongo:6.0
    container_name: todo-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  webapp:
    build: .
    container_name: todo-webapp
    restart: always
    ports:
      - "3000:3000"
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - REPO_URL=https://github.com/likithsshetty/Todo-List.git
      - JWT_SECRET=8f45a0bdf196d09df24f1c7d24ab9668
      - FLASK_PORT=5000
      - MONGO_URI=mongodb://mongo:27017/todo_app

volumes:
  mongo-data:
